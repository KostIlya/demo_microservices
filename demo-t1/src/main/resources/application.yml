server:
  port: 8082
spring:
  application:
    name: demo-t1
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
#      path: "/h2-console"
#      settings:
#        trace: true
#        web-allow-others: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
  kafka:
    producer:
      bootstrap-servers: localhost:9092
#      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
#      key-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      bootstrap-servers: localhost:9092
      group-id: t1_demo
      properties:
        spring:
          json:
            trusted.packages: "*"
            value.default.type: "ru.t1.demo_t1.model.event.TransactionEvent"
    topic:
      demo-metrics: t1_demo_metrics
      demo-transactions: t1_demo_transactions
      demo-transaction-accept: t1_demo_transaction_accept
      demo-transaction-result: t1_demo_transaction_result

  sql:
    init:
      mode: always
      continue-on-error: false

custom:
  metric:
    time_limit: 500
  cached:
    storage_time: 15000